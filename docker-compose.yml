services:
  exchange-latency-dashboard:
    build: .
    container_name: exchange-latency-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      EXCHANGE_REGION: "${EXCHANGE_REGION:-local}"
      EXCHANGE_STREAMS: "${EXCHANGE_STREAMS:-extended_rest,extended_bbo,extended_l2,extended_trades,extended_mark,extended_index,extended_order_test,extended_fill_test}"
      EXCHANGE_REPORT_SECONDS: "${EXCHANGE_REPORT_SECONDS:-5}"
      EXCHANGE_DB_PATH: "/app/data/latency.sqlite"
      EXCHANGE_CLOUD_PROVIDER: "${EXCHANGE_CLOUD_PROVIDER:-}"
      EXCHANGE_AWS_REGION: "${EXCHANGE_AWS_REGION:-}"
      EXCHANGE_AWS_AZ: "${EXCHANGE_AWS_AZ:-}"
      EXCHANGE_AWS_AZ_ID: "${EXCHANGE_AWS_AZ_ID:-}"
      EXCHANGE_AWS_SUBNET_ID: "${EXCHANGE_AWS_SUBNET_ID:-}"
      EXCHANGE_AWS_VPC_ID: "${EXCHANGE_AWS_VPC_ID:-}"
      EXCHANGE_INSTANCE_ID: "${EXCHANGE_INSTANCE_ID:-}"
      EXCHANGE_PRIVATE_IP: "${EXCHANGE_PRIVATE_IP:-}"
      EXCHANGE_PUBLIC_IP: "${EXCHANGE_PUBLIC_IP:-}"
      EXTENDED_MARKET: "${EXTENDED_MARKET:-BTC-USD}"
      EXTENDED_ENV: "${EXTENDED_ENV:-mainnet}"
      EXTENDED_REST_INTERVAL_SECONDS: "${EXTENDED_REST_INTERVAL_SECONDS:-1}"
      EXTENDED_TIMEOUT_SECONDS: "${EXTENDED_TIMEOUT_SECONDS:-5}"
      EXTENDED_API_KEY: "${EXTENDED_API_KEY:-}"
      EXTENDED_STARK_PUBLIC_KEY: "${EXTENDED_STARK_PUBLIC_KEY:-}"
      EXTENDED_STARK_PRIVATE_KEY: "${EXTENDED_STARK_PRIVATE_KEY:-}"
      EXTENDED_VAULT: "${EXTENDED_VAULT:-}"
      EXTENDED_CLIENT_ID: "${EXTENDED_CLIENT_ID:-}"
      EXTENDED_ORDER_TEST_SIDE: "${EXTENDED_ORDER_TEST_SIDE:-BUY}"
      EXTENDED_ORDER_TEST_QUANTITY: "${EXTENDED_ORDER_TEST_QUANTITY:-}"
      EXTENDED_ORDER_TEST_PRICE_OFFSET_PCT: "${EXTENDED_ORDER_TEST_PRICE_OFFSET_PCT:-10}"
      EXTENDED_ORDER_TEST_INTERVAL_SECONDS: "${EXTENDED_ORDER_TEST_INTERVAL_SECONDS:-15}"
      EXTENDED_ORDER_TEST_TIMEOUT_SECONDS: "${EXTENDED_ORDER_TEST_TIMEOUT_SECONDS:-10}"
      EXTENDED_ORDER_TEST_TAKER_FEE: "${EXTENDED_ORDER_TEST_TAKER_FEE:-}"
      EXTENDED_FILL_TEST_SIDE: "${EXTENDED_FILL_TEST_SIDE:-BUY}"
      EXTENDED_FILL_TEST_QUANTITY: "${EXTENDED_FILL_TEST_QUANTITY:-}"
      EXTENDED_FILL_TEST_PRICE_OFFSET_PCT: "${EXTENDED_FILL_TEST_PRICE_OFFSET_PCT:-1}"
      EXTENDED_FILL_TEST_INTERVAL_SECONDS: "${EXTENDED_FILL_TEST_INTERVAL_SECONDS:-60}"
      EXTENDED_FILL_TEST_TIMEOUT_SECONDS: "${EXTENDED_FILL_TEST_TIMEOUT_SECONDS:-10}"
      EXTENDED_FILL_TEST_TAKER_FEE: "${EXTENDED_FILL_TEST_TAKER_FEE:-}"
      EXTENDED_FILL_ALLOW_MAINNET: "${EXTENDED_FILL_ALLOW_MAINNET:-false}"
    volumes:
      - ./data:/app/data
