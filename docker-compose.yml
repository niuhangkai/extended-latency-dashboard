services:
  exchange-latency-dashboard:
    build: .
    container_name: exchange-latency-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      EXCHANGE_REGION: "${EXCHANGE_REGION:-${MEXC_REGION:-local}}"
      EXCHANGE_SYMBOL: "${EXCHANGE_SYMBOL:-${MEXC_SYMBOL:-BTCUSDT}}"
      EXCHANGE_STREAMS: "${EXCHANGE_STREAMS:-${MEXC_STREAMS:-spot_bbo,spot_trades,spot_l2,contract_ping}}"
      EXCHANGE_REPORT_SECONDS: "${EXCHANGE_REPORT_SECONDS:-${MEXC_REPORT_SECONDS:-5}}"
      EXCHANGE_DB_PATH: "/app/data/latency.sqlite"
      MEXC_API_KEY: "${MEXC_API_KEY:-}"
      MEXC_API_SECRET: "${MEXC_API_SECRET:-}"
      MEXC_ORDER_TEST_SYMBOL: "${MEXC_ORDER_TEST_SYMBOL:-}"
      MEXC_ORDER_TEST_SIDE: "${MEXC_ORDER_TEST_SIDE:-BUY}"
      MEXC_ORDER_TEST_QUANTITY: "${MEXC_ORDER_TEST_QUANTITY:-0.001}"
      MEXC_ORDER_TEST_PRICE: "${MEXC_ORDER_TEST_PRICE:-100000}"
      MEXC_ORDER_TEST_INTERVAL_SECONDS: "${MEXC_ORDER_TEST_INTERVAL_SECONDS:-10}"
      MEXC_ORDER_TEST_RECV_WINDOW_MS: "${MEXC_ORDER_TEST_RECV_WINDOW_MS:-5000}"
      MEXC_ORDER_TEST_TIMEOUT_SECONDS: "${MEXC_ORDER_TEST_TIMEOUT_SECONDS:-5}"
      EXTENDED_MARKET: "${EXTENDED_MARKET:-BTC-USD}"
      EXTENDED_ENV: "${EXTENDED_ENV:-mainnet}"
      EXTENDED_REST_INTERVAL_SECONDS: "${EXTENDED_REST_INTERVAL_SECONDS:-1}"
      EXTENDED_TIMEOUT_SECONDS: "${EXTENDED_TIMEOUT_SECONDS:-5}"
      EXTENDED_API_KEY: "${EXTENDED_API_KEY:-}"
      EXTENDED_STARK_PUBLIC_KEY: "${EXTENDED_STARK_PUBLIC_KEY:-}"
      EXTENDED_STARK_PRIVATE_KEY: "${EXTENDED_STARK_PRIVATE_KEY:-}"
      EXTENDED_VAULT: "${EXTENDED_VAULT:-}"
      EXTENDED_CLIENT_ID: "${EXTENDED_CLIENT_ID:-}"
      EXTENDED_ORDER_TEST_SIDE: "${EXTENDED_ORDER_TEST_SIDE:-BUY}"
      EXTENDED_ORDER_TEST_QUANTITY: "${EXTENDED_ORDER_TEST_QUANTITY:-}"
      EXTENDED_ORDER_TEST_PRICE_OFFSET_PCT: "${EXTENDED_ORDER_TEST_PRICE_OFFSET_PCT:-10}"
      EXTENDED_ORDER_TEST_INTERVAL_SECONDS: "${EXTENDED_ORDER_TEST_INTERVAL_SECONDS:-15}"
      EXTENDED_ORDER_TEST_TIMEOUT_SECONDS: "${EXTENDED_ORDER_TEST_TIMEOUT_SECONDS:-10}"
      EXTENDED_ORDER_TEST_TAKER_FEE: "${EXTENDED_ORDER_TEST_TAKER_FEE:-0.00025}"
    volumes:
      - ./data:/app/data
